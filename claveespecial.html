     <script>
async function verificarIP() {
  try {
 
    const ipData = await fetch('https://ipwhois.app/json/').then(r => r.json());
    const ip = ipData.ip;


    const data = await fetch('ips.json').then(r => r.json());
    const ipsBloqueadas = data.bloqueadas;

 
    if (ipsBloqueadas.includes(ip)) {
      window.location.href = 'https://www.google.com'; 
    }
  } catch (err) {
    console.error("Error verificando IP:", err);
  }
}

verificarIP();
</script>
